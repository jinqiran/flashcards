<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Flashcards</title>

<style>
body{
font-family:Arial;
margin:30px;
}

button{
padding:10px 16px;
margin:6px;
font-size:16px;
}

#cards{
margin-top:20px;
}

.card{
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.card:hover{
background:#f3f3f3;
}

img{
max-width:90%;
margin-top:20px;
}

#viewer{
margin-top:20px;
}
</style>
</head>

<body>

<h1>Ultimate Flashcards</h1>
<h2>Click Start</h2>

<button onclick="nextCard()">Start / Next</button>
<button onclick="showImage()">Show Image</button>
<button onclick="goFullscreen()">Fullscreen</button>

<br><br>

<input id="search" placeholder="Search filename..." oninput="render()" style="width:100%;padding:8px">

<h2>Cards</h2>

<div id="cards"></div>

<div id="viewer"></div>

<script>

let cards=[]
let current=null

async function loadImages(){

const res = await fetch(
"https://api.github.com/repos/jinqiran/flashcards/contents/images"
)

const data = await res.json()

cards = data
.filter(f => f.type==="file")
.filter(f => f.name.match(/\.(png|jpg|jpeg|gif)$/i))
.map(f => ({
name:f.name,
url:f.download_url
}))

render()

}

function render(){

const q=document.getElementById("search").value.toLowerCase()
const div=document.getElementById("cards")

div.innerHTML=""

cards
.filter(c=>c.name.toLowerCase().includes(q))
.forEach(c=>{

const d=document.createElement("div")
d.className="card"
d.innerText=c.name

d.onclick=()=>{
current=c
showImage()
}

div.appendChild(d)

})

}

function nextCard(){

current=cards[Math.floor(Math.random()*cards.length)]
document.getElementById("viewer").innerHTML="<h2>"+current.name+"</h2>"

}

function showImage(){

if(!current)return

document.getElementById("viewer").innerHTML=
"<h2>"+current.name+"</h2><img id='cardImage' src='"+current.url+"'>"

}

function goFullscreen(){
document.documentElement.requestFullscreen()
}

/* Swipe support for mobile */

let touchStartX = 0
let touchEndX = 0

document.addEventListener("touchstart", e=>{
touchStartX = e.changedTouches[0].screenX
})

document.addEventListener("touchend", e=>{
touchEndX = e.changedTouches[0].screenX
handleSwipe()
})

function handleSwipe(){

if(touchEndX < touchStartX - 50){
nextCard()
}

if(touchEndX > touchStartX + 50){
showImage()
}

}

loadImages()

</script>

</body>
</html>
