<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flashcardo">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Flashcardo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-main brand-block">
        <img class="brand-logo" src="icons/icon-192.png" alt="Flashcardo logo">
        <div class="brand-copy">
          <div class="eyebrow">Flashcardo · 手機優先 · 離線可用</div>
          <h1>Flashcardo</h1>
          <div class="brand-subtle">Flashcards / Quiz</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="toggleListBtn" class="ghost-btn" type="button">卡片列表</button>
        <button id="toggleToolsBtn" class="ghost-btn" type="button">更多功能</button>
      </div>
    </header>

    <main class="layout">
      <section class="main-panel">
        <div class="prompt-card tappable" id="promptCard">
          <div class="prompt-head">
            <div>
              <div class="label">題目</div>
              <div id="quizInfo" class="subtle">尚未開始</div>
            </div>
            <div class="pill" id="cardCounter">0 / 0</div>
          </div>
          <div id="quizPrompt" class="prompt-text">按「開始」進入測驗</div>
          <div class="tap-hint">輕點這裡可顯示圖片；左右滑動可切換卡片</div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div class="viewer-card">
          <div class="viewer-topline">
            <span id="viewerTitle">圖片</span>
            <span id="zoomLabel" class="subtle">100%</span>
          </div>
          <div id="imageViewport" class="image-viewport">
            <div id="imageStage" class="image-stage">
              <div class="placeholder">尚未顯示圖片</div>
            </div>
          </div>
        </div>

        <div id="toolsCard" class="controls-card hidden-mobile-panel">
          <div class="controls-head">
            <div class="label no-margin">工具</div>
            <div class="subtle">手機上常用功能已放到底部操作列</div>
          </div>
          <div class="button-grid secondary-grid">
            <button id="startBtn" type="button">開始</button>
            <button id="shuffleBtn" type="button">重洗順序</button>
            <button id="hideBtn" type="button">隱藏圖片</button>
            <button id="randomBtn" type="button">隨機一張</button>
            <button id="resetZoomBtn" type="button">重設縮放</button>
            <button id="zoomOutBtn" type="button">縮小</button>
            <button id="zoomInBtn" type="button">放大</button>
            <button id="fitBtn" type="button">適合寬度</button>
          </div>
        </div>
      </section>

      <aside id="listPanel" class="list-panel" aria-hidden="true">
        <div class="list-header">
          <div>
            <h2>全部卡片</h2>
            <div class="subtle">點一下直接打開該卡</div>
          </div>
          <button id="closeListBtn" class="ghost-btn small-btn" type="button">關閉</button>
        </div>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜尋卡片名稱">
          <button id="clearSearchBtn" class="ghost-btn small-btn" type="button">清除</button>
        </div>
        <div id="cards" class="cards-list"></div>
      </aside>

      <div id="drawerBackdrop" class="drawer-backdrop hidden"></div>
    </main>

    <nav class="mobile-action-bar" aria-label="主要操作">
      <button id="mobilePrevBtn" type="button">上一張</button>
      <button id="mobileRevealBtn" type="button" class="accent-strong">顯示圖片</button>
      <button id="mobileNextBtn" type="button">下一張</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
