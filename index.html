
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Flashcards</title>

<style>
body{font-family:Arial;margin:10px;background:#f5f5f5}
h2{margin:5px 0}
#quizName{font-size:22px;font-weight:bold}
#quizImg{max-width:100%;display:none;margin-top:10px}
button{padding:10px;margin:4px;border:none;border-radius:6px;background:#2d7ff9;color:white}
.card{background:white;border:1px solid #ddd;border-radius:8px;padding:8px;margin:6px 0}
.card img{max-width:100%;display:none;margin-top:6px}
.new{border:2px solid red}
#search{width:100%;padding:8px;margin-bottom:8px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let cards=[]
let pool=[]
let current=null
let done=0

async function loadImages(){

const res = await fetch(
"https://api.github.com/repos/jinqiran/flashcards/contents/images"
)

const data = await res.json()

cards = data
.filter(f => f.type === "file")
.filter(f => f.name.match(/\.(png|jpg|jpeg|gif)$/i))
.map(f => ({
name: f.name,
url: f.download_url,
time: Date.now()
}))
  
render()

}

loadImages()

function render(){

const q=document.getElementById("search").value.toLowerCase()
const div=document.getElementById("cards")

div.innerHTML=""

cards.forEach(c=>{

if(q && !c.name.toLowerCase().includes(q)) return

const card=document.createElement("div")
card.className="card"

if(Date.now()-c.time<86400000) card.classList.add("new")

const name=document.createElement("div")
name.innerText=c.name

const img=document.createElement("img")
img.src=c.url

card.appendChild(name)
card.appendChild(img)

card.onclick=()=>{
img.style.display=img.style.display==="none"?"block":"none"
}

div.appendChild(card)

})

}

function nextQuiz(){

if(cards.length===0) return

if(pool.length===0){
pool=[...cards]
done=0
}

const i=Math.floor(Math.random()*pool.length)
current=pool.splice(i,1)[0]

document.getElementById("quizName").innerText=current.name

const img=document.getElementById("quizImg")
img.src=current.url
img.style.display="none"

done++
document.getElementById("stats").innerText="Progress "+done+" / "+cards.length

}

function showAnswer(){
if(current){
document.getElementById("quizImg").style.display="block"
}
}

function fullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}
}
</script>

</head>

<body>

<h2>Ultimate Flashcards</h2>

<div>
<div id="quizName">Click Start</div>
<img id="quizImg">
<br>
<button onclick="nextQuiz()">Start / Next</button>
<button onclick="showAnswer()">Show Image</button>
<button onclick="fullscreen()">Fullscreen</button>
<div id="stats"></div>
</div>

<br>

<input id="search" placeholder="Search filename..." oninput="render()">

<h3>Cards</h3>
<div id="cards"></div>

</body>
</html>
