<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Quiz</title>
<style>
body{font-family:Arial,sans-serif;margin:16px;line-height:1.35}
h1{margin:0 0 10px 0}
#quizPrompt{font-size:26px;font-weight:bold;margin-bottom:10px;word-break:break-word}
#viewer{border:1px solid #ddd;padding:10px;border-radius:10px;margin-top:10px;background:#fff}
#imageViewport{overflow:auto;max-height:75vh;touch-action:none}
#quizImage{display:block;width:100%;height:auto;transform-origin:top center}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
button{padding:12px 16px;font-size:16px;cursor:pointer}
.card{padding:12px 10px;border-bottom:1px solid #ddd;cursor:pointer}
.card:hover{background:#f5f5f5}
#quizInfo{color:#555;margin:8px 0 0 0}
</style>
</head>
<body>

<h1>Flashcard Quiz</h1>

<div id="quizPrompt">Press Start Quiz</div>

<div id="viewer">
  <div id="imageViewport">
    <div id="imageStage"></div>
  </div>
</div>

<div class="controls">
  <button type="button" onclick="startQuiz()">Start Quiz</button>
  <button type="button" onclick="prevQuiz()">Previous</button>
  <button type="button" onclick="nextQuiz()">Next</button>
  <button type="button" onclick="showImage()">Show Image</button>
  <button type="button" onclick="zoomOut()">Zoom -</button>
  <button type="button" onclick="zoomIn()">Zoom +</button>
</div>

<div id="quizInfo">Quiz not started</div>

<h2>All Cards</h2>
<div id="cards"></div>

<script>
const IMAGE_API = "https://api.github.com/repos/jinqiran/flashcards/contents/images";

let cards = [];
let quizDeck = [];
let quizIndex = -1;
let current = null;
let zoom = 1;

function extractLeadingNumber(name){
  const m = name.match(/^(\d+)/);
  return m ? parseInt(m[1], 10) : -1;
}

function compareCardsDesc(a, b){
  const an = extractLeadingNumber(a.name);
  const bn = extractLeadingNumber(b.name);

  if (an !== bn) return bn - an;

  const abase = a.name.toLowerCase();
  const bbase = b.name.toLowerCase();

  if (abase < bbase) return 1;
  if (abase > bbase) return -1;
  return 0;
}

async function loadImages(){
  const res = await fetch(IMAGE_API);
  const data = await res.json();

  cards = data
    .filter(f => f.type === "file")
    .filter(f => /\.(png|jpg|jpeg|gif|webp)$/i.test(f.name))
    .map(f => ({ name: f.name, url: f.download_url }));

  cards.sort(compareCardsDesc);
  render();
}

function render(){
  const div = document.getElementById("cards");
  div.innerHTML = "";

  cards.forEach(c => {
    const row = document.createElement("div");
    row.className = "card";
    row.textContent = c.name;
    row.onclick = () => {
      current = c;
      document.getElementById("quizPrompt").textContent = current.name;
      showImage();
    };
    div.appendChild(row);
  });
}

function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function updateQuizInfo(){
  if (quizDeck.length === 0 || quizIndex < 0 || !current){
    document.getElementById("quizInfo").textContent = "Quiz not started";
    return;
  }
  document.getElementById("quizInfo").textContent =
    "Quiz progress: " + (quizIndex + 1) + " / " + quizDeck.length;
}

function clearImage(){
  document.getElementById("imageStage").innerHTML = "";
}

function startQuiz(){
  if (cards.length === 0){
    document.getElementById("quizPrompt").textContent = "No cards found";
    document.getElementById("quizInfo").textContent = "No cards found";
    return;
  }

  quizDeck = [...cards];
  shuffle(quizDeck);
  quizIndex = 0;
  current = quizDeck[quizIndex];
  zoom = 1;
  document.getElementById("quizPrompt").textContent = current.name;
  clearImage();
  updateQuizInfo();
  window.scrollTo({top:0, behavior:"smooth"});
}

function ensureQuizStarted(){
  if (quizDeck.length === 0 || quizIndex < 0 || !current){
    startQuiz();
    return false;
  }
  return true;
}

function nextQuiz(){
  if (!ensureQuizStarted()) return;

  quizIndex += 1;
  if (quizIndex >= quizDeck.length){
    shuffle(quizDeck);
    quizIndex = 0;
  }

  current = quizDeck[quizIndex];
  zoom = 1;
  document.getElementById("quizPrompt").textContent = current.name;
  clearImage();
  updateQuizInfo();
  window.scrollTo({top:0, behavior:"smooth"});
}

function prevQuiz(){
  if (!ensureQuizStarted()) return;

  quizIndex -= 1;
  if (quizIndex < 0){
    quizIndex = quizDeck.length - 1;
  }

  current = quizDeck[quizIndex];
  zoom = 1;
  document.getElementById("quizPrompt").textContent = current.name;
  clearImage();
  updateQuizInfo();
  window.scrollTo({top:0, behavior:"smooth"});
}

function showImage(){
  if (!current) return;

  document.getElementById("imageStage").innerHTML =
    "<img id='quizImage' src='" + current.url + "' alt=''>";

  applyZoom();
}

function applyZoom(){
  const img = document.getElementById("quizImage");
  if (img){
    img.style.transform = "scale(" + zoom + ")";
  }
}

function zoomIn(){
  zoom += 0.1;
  if (zoom > 8) zoom = 8;
  applyZoom();
}

function zoomOut(){
  zoom -= 0.1;
  if (zoom < 0.1) zoom = 0.1;
  applyZoom();
}

loadImages();
</script>

</body>
</html>
