<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Quiz</title>
<style>
body{font-family:Arial;margin:20px}
#quizPrompt{font-size:28px;font-weight:bold;margin-bottom:10px}
#viewer{border:1px solid #ddd;padding:10px;border-radius:10px;margin-top:10px}
#imageViewport{overflow:auto;max-height:75vh;touch-action:none}
#quizImage{width:100%;height:auto;transform-origin:top center}
button{padding:10px 16px;margin:4px;font-size:16px;cursor:pointer}
.card{padding:10px;border-bottom:1px solid #ddd;cursor:pointer}
.card:hover{background:#f5f5f5}
</style>
</head>
<body>

<h1>Flashcard Quiz</h1>

<div id="quizPrompt">Press Start Quiz</div>

<div id="viewer">
<div id="imageViewport">
<div id="imageStage"></div>
</div>
</div>

<div>
<button onclick="startQuiz()">Start Quiz</button>
<button onclick="prevQuiz()">Previous</button>
<button onclick="nextQuiz()">Next</button>
<button onclick="showImage()">Show Image</button>
<button onclick="zoomOut()">Zoom -</button>
<button onclick="zoomIn()">Zoom +</button>
</div>

<h2>All Cards</h2>
<div id="cards"></div>

<script>

const IMAGE_API="https://api.github.com/repos/jinqiran/flashcards/contents/images"

let cards=[]
let quizDeck=[]
let index=0
let current=null
let zoom=1

async function loadImages(){

const res=await fetch(IMAGE_API)
const data=await res.json()

cards=data
.filter(f=>f.type==="file")
.filter(f=>/\.(png|jpg|jpeg|gif|webp)$/i.test(f.name))
.map(f=>({name:f.name,url:f.download_url}))

render()

}

function render(){

const div=document.getElementById("cards")
div.innerHTML=""

cards.forEach(c=>{

const row=document.createElement("div")
row.className="card"
row.textContent=c.name

row.onclick=()=>{
current=c
showImage()
}

div.appendChild(row)

})

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}

}

function startQuiz(){

quizDeck=[...cards]
shuffle(quizDeck)

index=0
current=quizDeck[index]

document.getElementById("quizPrompt").textContent=current.name
clearImage()

}

function nextQuiz(){

index++

if(index>=quizDeck.length){
shuffle(quizDeck)
index=0
}

current=quizDeck[index]
document.getElementById("quizPrompt").textContent=current.name
clearImage()

}

function prevQuiz(){

index--

if(index<0){
index=quizDeck.length-1
}

current=quizDeck[index]
document.getElementById("quizPrompt").textContent=current.name
clearImage()

}

function clearImage(){
document.getElementById("imageStage").innerHTML=""
}

function showImage(){

if(!current)return

document.getElementById("imageStage").innerHTML=
"<img id='quizImage' src='"+current.url+"'>"

applyZoom()

}

function applyZoom(){

const img=document.getElementById("quizImage")
if(img){
img.style.transform="scale("+zoom+")"
}

}

function zoomIn(){
zoom+=0.1
applyZoom()
}

function zoomOut(){
zoom-=0.1
if(zoom<0.1)zoom=0.1
applyZoom()
}

loadImages()

</script>

</body>
</html>
