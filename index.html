<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Flashcards</title>
<style>
body{
  font-family:Arial, sans-serif;
  margin:20px;
  line-height:1.35;
}
h1{margin:0 0 10px 0;}
h2{margin:8px 0 12px 0;}
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0 14px 0;
}
button{
  padding:10px 16px;
  font-size:16px;
  cursor:pointer;
}
#search{
  width:100%;
  padding:10px;
  font-size:16px;
  box-sizing:border-box;
  margin:12px 0 18px 0;
}
#stats, #quizStats{
  margin:8px 0 10px 0;
  font-size:15px;
}
#quizBox{
  border:1px solid #ddd;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
  background:#fafafa;
}
#quizPrompt{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
  word-break:break-word;
}
#viewer{
  margin:12px 0 14px 0;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  background:white;
  min-height:60px;
}
#viewer img{
  max-width:100%;
  height:auto;
  display:block;
  margin-top:8px;
  border-radius:8px;
}
#cards{
  margin-top:10px;
}
.card{
  padding:12px 10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.card:hover{
  background:#f5f5f5;
}
.card-left{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.card-name{
  word-break:break-word;
}
.badge{
  display:inline-block;
  font-size:12px;
  padding:3px 7px;
  border-radius:999px;
  border:1px solid #ccc;
  white-space:nowrap;
}
.badge.new{
  background:#fff0f0;
  border-color:#ff6b6b;
  color:#c62828;
  font-weight:bold;
}
.badge.learned{
  background:#eefaf0;
  border-color:#6abf69;
  color:#1b5e20;
}
.small{
  color:#666;
  font-size:13px;
}
#topNote{
  color:#555;
  font-size:14px;
  margin-bottom:8px;
}
</style>
</head>
<body>

<h1>Ultimate Flashcards</h1>

<div id="topNote">手機：左滑下一題，右滑顯示圖片。</div>

<div id="quizBox">
  <div id="quizPrompt">點 Start / Next 開始 quiz</div>
  <div id="viewer"></div>
  <div class="controls">
    <button onclick="nextCard()">Start / Next</button>
    <button onclick="showImage()">Show Image</button>
    <button onclick="markLearned(true)">Mark Learned</button>
    <button onclick="markLearned(false)">Mark Unlearned</button>
    <button onclick="goFullscreen()">Fullscreen</button>
  </div>
  <div id="quizStats"></div>
</div>

<input id="search" placeholder="Search filename..." oninput="render()">

<div id="stats"></div>

<h2>Cards</h2>
<div id="cards"></div>

<script>
const REPO_OWNER = "jinqiran";
const REPO_NAME = "flashcards";
const IMAGE_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/images`;
const STORAGE_KEY = "flashcards_learning_record_v2";

let cards = [];
let current = null;
let quizPool = [];
let quizDone = 0;
let touchStartX = 0;
let touchEndX = 0;

function loadProgress(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  }catch(e){
    return {};
  }
}

function saveProgress(progress){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function getCardKey(card){
  return card.name;
}

function getTodayStrings(){
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  return [
    `${y}.${m}.${d}`,
    `${y}.${m}.${String(d).padStart(2,"0")}`,
    `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`,
    `${y}-${m}-${d}`
  ];
}

function filenameLooksToday(name){
  const todayStrings = getTodayStrings();
  return todayStrings.some(s => name.includes(s));
}

async function loadImages(){
  const res = await fetch(IMAGE_API);
  const data = await res.json();

  cards = data
    .filter(f => f.type === "file")
    .filter(f => /\.(png|jpg|jpeg|gif|webp)$/i.test(f.name))
    .map(f => ({
      name: f.name,
      url: f.download_url,
      isNewToday: filenameLooksToday(f.name)
    }));

  render();
  updateStats();
}

function updateStats(){
  const progress = loadProgress();
  const learnedCount = cards.filter(c => progress[getCardKey(c)]?.learned).length;
  const viewedCount = cards.filter(c => progress[getCardKey(c)]?.views > 0).length;
  const newCount = cards.filter(c => c.isNewToday).length;

  document.getElementById("stats").innerHTML =
    `Total: <b>${cards.length}</b> ｜ Learned: <b>${learnedCount}</b> ｜ Viewed: <b>${viewedCount}</b> ｜ New today: <b>${newCount}</b>`;

  const remaining = quizPool.length;
  document.getElementById("quizStats").innerHTML =
    `Quiz progress: <b>${quizDone}</b> / <b>${cards.length}</b>` + (remaining ? ` ｜ Remaining this round: <b>${remaining}</b>` : "");
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("cards");
  const progress = loadProgress();
  div.innerHTML = "";

  cards
    .filter(c => c.name.toLowerCase().includes(q))
    .forEach(c => {
      const row = document.createElement("div");
      row.className = "card";

      const left = document.createElement("div");
      left.className = "card-left";

      const name = document.createElement("div");
      name.className = "card-name";
      name.textContent = c.name;

      left.appendChild(name);

      if(c.isNewToday){
        const newBadge = document.createElement("span");
        newBadge.className = "badge new";
        newBadge.textContent = "NEW";
        left.appendChild(newBadge);
      }

      if(progress[getCardKey(c)]?.learned){
        const learnedBadge = document.createElement("span");
        learnedBadge.className = "badge learned";
        learnedBadge.textContent = "LEARNED";
        left.appendChild(learnedBadge);
      }

      const meta = document.createElement("div");
      meta.className = "small";
      meta.textContent = `views: ${progress[getCardKey(c)]?.views || 0}`;

      row.appendChild(left);
      row.appendChild(meta);

      row.onclick = () => {
        current = c;
        increaseViews(c);
        showImage();
      };

      div.appendChild(row);
    });
}

function increaseViews(card){
  const progress = loadProgress();
  const key = getCardKey(card);
  if(!progress[key]) progress[key] = {views:0, learned:false, lastSeen:null};
  progress[key].views += 1;
  progress[key].lastSeen = new Date().toISOString();
  saveProgress(progress);
  updateStats();
  render();
}

function resetQuizPool(){
  quizPool = [...cards];
  for(let i = quizPool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [quizPool[i], quizPool[j]] = [quizPool[j], quizPool[i]];
  }
  quizDone = 0;
}

function nextCard(){
  if(cards.length === 0){
    document.getElementById("quizPrompt").textContent = "No cards found";
    return;
  }
  if(quizPool.length === 0){
    resetQuizPool();
  }
  current = quizPool.pop();
  quizDone += 1;
  document.getElementById("quizPrompt").textContent = current.name;
  document.getElementById("viewer").innerHTML = "";
  window.scrollTo({top:0, behavior:"smooth"});
  updateStats();
}

function showImage(){
  if(!current) return;
  increaseViews(current);
  document.getElementById("quizPrompt").textContent = current.name;
  document.getElementById("viewer").innerHTML =
    `<img src="${encodeURI(current.url)}" alt="${escapeHtml(current.name)}">`;
  window.scrollTo({top:0, behavior:"smooth"});
}

function markLearned(value){
  if(!current) return;
  const progress = loadProgress();
  const key = getCardKey(current);
  if(!progress[key]) progress[key] = {views:0, learned:false, lastSeen:null};
  progress[key].learned = value;
  progress[key].lastSeen = new Date().toISOString();
  saveProgress(progress);
  updateStats();
  render();
}

function goFullscreen(){
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}

function escapeHtml(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

document.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe(){
  if(touchEndX < touchStartX - 50){
    nextCard();
  } else if(touchEndX > touchStartX + 50){
    showImage();
  }
}

loadImages();
</script>

</body>
</html>
