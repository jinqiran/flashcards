name: Auto update cards

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'images/**'
      - 'scripts/generate_cards.py'
      - '.github/workflows/auto-update-cards.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate cards.json and cache version
        run: python scripts/generate_cards.py

      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json build-meta.json sw.js
          git commit -m "Auto-update cards and cache"
          git push
