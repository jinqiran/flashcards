name: Auto update cards from images

on:
  push:
    paths:
      - 'images/**'
      - 'scripts/generate_cards.py'
      - '.github/workflows/auto-update-cards.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate cards and bump cache
        run: python scripts/generate_cards.py

      - name: Commit updated app data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto update cards from images
          file_pattern: cards.json build-meta.json sw.js index.html
